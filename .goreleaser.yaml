version: 2

project_name: sdm

builds:
  - id: sdm
    main: .
    binary: sdm
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X sdm/internal/cli.Version={{.Version}}

archives:
  - id: default
    ids: [sdm]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

brews:
  - name: sdm
    repository:
      owner: Miista
      name: homebrew-sdm
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-sdm
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    install: |
      bin.install "sdm"
    test: |
      assert_match "sdm", shell_output("#{bin}/sdm version")
