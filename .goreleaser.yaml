version: 2

project_name: sd

builds:
  - id: sd
    main: .
    binary: sd
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X sd/internal/cli.Version={{.Version}}

archives:
  - id: default
    ids: [sd]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt

brews:
  - name: sd
    repository:
      owner: Miista
      name: homebrew-sd
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-sd
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    install: |
      bin.install "sd"
    test: |
      assert_match "sd", shell_output("#{bin}/sd version")
